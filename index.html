<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rick的自由空间</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", Helvetica, Arial, sans-serif;
    background: #f6f7f9;
    color: #2c2c2c;
    line-height: 1.6;
  }
  header {
    background: #2d3142;
    color: #fff;
    padding: 48px 20px;
    text-align: center;
  }
  header h1 {
    font-size: 2.2rem;
    font-weight: 600;
    letter-spacing: 1px;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }
  section {
    background: #fff;
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  section h2 {
    font-size: 1.2rem;
    margin-bottom: 12px;
    color: #2d3142;
  }
  section p {
    color: #555;
  }
  .doc-list {
    list-style: none;
  }
  .doc-list li {
    padding: 10px 0;
    border-bottom: 1px solid #eee;
  }
  .doc-list li:last-child {
    border-bottom: none;
  }
  .doc-list a {
    color: #4361ee;
    text-decoration: none;
    font-weight: 500;
  }
  .doc-list a:hover {
    text-decoration: underline;
  }
  .placeholder {
    color: #999;
    font-style: italic;
  }
  footer {
    text-align: center;
    color: #999;
    font-size: 0.85rem;
    padding: 20px;
  }
</style>
</head>
<body>

<header>
  <h1>Rick的自由空间</h1>
</header>

<main>
  <section>
    <h2>关于这里</h2>
    <p>这里是一个简单的信息发布页面。这段文字是占位说明,你可以随时替换成自己想说的内容。</p>
  </section>

  <section>
    <h2>文档下载</h2>
    <ul class="doc-list">
      <!-- 在下方添加文档链接,例如:
      <li><a href="docs/example.pdf">示例文档.pdf</a></li>
      -->
      <li class="placeholder">暂无文档,文件放入 docs 文件夹后,在此处添加链接即可显示。</li>
    </ul>
  </section>
</main>

<footer>
  © 2026 Rick
</footer>

</body>
</html>
